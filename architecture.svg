<svg width="680" height="780" viewBox="0 0 680 780" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Condor Cloud Lab architecture</title>
<desc>Diagram showing AWS infrastructure: a VPC containing public and private subnets with an EC2 instance, alongside a serverless path through API Gateway, Lambda, and DynamoDB. Supporting services include S3, SQS, SNS, KMS, and CloudTrail. A GitHub Actions CI/CD pipeline authenticates via OIDC to an IAM role and deploys into this infrastructure.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#3d3d3a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<rect width="680" height="780" fill="#ffffff"/>
<g>
<rect x="40" y="30" width="180" height="56" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="130" y="50" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#712B13">GitHub Actions</text>
<text x="130" y="68" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#993C1D">terraform plan/apply</text>
</g>
<g>
